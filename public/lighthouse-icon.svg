<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Lighthouse base -->
  <rect x="40" y="70" width="20" height="25" fill="url(#grad1)" rx="2"/>
  
  <!-- Lighthouse tower -->
  <polygon points="45,70 55,70 52,20 48,20" fill="url(#grad1)"/>
  
  <!-- Light beam -->
  <polygon points="50,20 30,10 70,10" fill="#FCD34D" opacity="0.7"/>
  <polygon points="50,20 25,15 75,15" fill="#F59E0B" opacity="0.5"/>
  
  <!-- Light house top -->
  <circle cx="50" cy="20" r="4" fill="#F59E0B"/>
  
  <!-- Windows -->
  <rect x="47" y="35" width="6" height="8" fill="#FEF3C7" rx="1"/>
  <rect x="47" y="50" width="6" height="8" fill="#FEF3C7" rx="1"/>
  
  <!-- Door -->
  <rect x="46" y="80" width="8" height="12" fill="#1E40AF" rx="1"/>
  
  <!-- Waves -->
  <path d="M10,85 Q20,80 30,85 T50,85 T70,85 T90,85" stroke="#06B6D4" stroke-width="2" fill="none"/>
  <path d="M15,90 Q25,87 35,90 T55,90 T75,90 T95,90" stroke="#0891B2" stroke-width="1.5" fill="none"/>
</svg>